services:
    dev:
        build:
            context: ${RELATIVE_PATH_TO_ROOT}
            dockerfile: ${DOCKER_PATH}/Dockerfile
            args:
                DOCKER_PATH: ${DOCKER_PATH}
                WORKDIR: ${CONTAINER_ROOT_PATH}
                CONFIG_PATH: ${DOCKER_PATH}
                ROOT_PATH: ${CONTAINER_ROOT_PATH}
        restart: 'no'
        environment:
            MELODY_DEV_REFLEX_ENABLED: ${MELODY_DEV_REFLEX_ENABLED:-1}
            MELODY_DEV_EXAMPLE_DIR: ${MELODY_DEV_EXAMPLE_DIR:-/app/v3/.example}
            MELODY_DEV_RUN_COMMAND: ${MELODY_DEV_RUN_COMMAND:-go run .}
        volumes:
            - ${RELATIVE_PATH_TO_ROOT}:${CONTAINER_ROOT_PATH}
            - ${RELATIVE_PATH_TO_ROOT}/.dev-data/go/pkg/mod:/go/pkg/mod
            - ${RELATIVE_PATH_TO_ROOT}/.dev-data/go/cache:/go/cache
            - ${RELATIVE_PATH_TO_ROOT}/.dev-data/bash/.bash_history:/home/.bash_history
        ports:
            - "${DEV_HTTP_HOST_PORT:-8180}:8080"

    load-balancer:
        image: nginx:1.27-alpine
        restart: 'no'
        depends_on:
            - dev
        volumes:
            - ${RELATIVE_PATH_TO_ROOT}/${DOCKER_PATH}/load-balancer/vhost.conf:/etc/nginx/conf.d/default.conf:ro
        ports:
            - "${LOAD_BALANCER_HTTP_HOST_PORT:-80}:80"

    rabbitmq:
        image: rabbitmq:3.13-management
        profiles: [ 'all' ]
        restart: 'no'
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        ports:
            - "${RABBITMQ_HOST_PORT:-5673}:5672"
            - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15673}:15672"

    redis:
        image: redis:7-alpine
        profiles: [ 'all' ]
        restart: 'no'
        ports:
            - "${REDIS_HOST_PORT:-6380}:6379"

    mysql:
        image: mysql:8.4
        profiles: [ 'all' ]
        restart: 'no'
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: melody_example
            MYSQL_USER: melody
            MYSQL_PASSWORD: melody
        ports:
            - "${MYSQL_HOST_PORT:-3307}:3306"

    localstack:
        image: localstack/localstack:3.8
        profiles: [ 'all' ]
        restart: 'no'
        environment:
            SERVICES: s3
            DEFAULT_REGION: eu-central-1
            PERSISTENCE: 1
            LS_LOG: warn
        volumes:
            - ${RELATIVE_PATH_TO_ROOT}/.dev-data/localstack:/var/lib/localstack
        ports:
            - "${LOCALSTACK_HOST_PORT:-4566}:4566"
