services:
    dev:
        build:
            context: ${RELATIVE_PATH_TO_ROOT}
            dockerfile: ${DOCKER_PATH}/Dockerfile
            args:
                DOCKER_PATH: ${DOCKER_PATH}
                WORKDIR: ${CONTAINER_ROOT_PATH}
                CONFIG_PATH: ${DOCKER_PATH}
                ROOT_PATH: ${CONTAINER_ROOT_PATH}
        restart: 'no'
        volumes:
            - ${RELATIVE_PATH_TO_ROOT}:${CONTAINER_ROOT_PATH}
            - ${RELATIVE_PATH_TO_ROOT}/.dev-data/go/pkg/mod:/go/pkg/mod
            - ${RELATIVE_PATH_TO_ROOT}/.dev-data/go/cache:/go/cache
            - ${RELATIVE_PATH_TO_ROOT}/.dev-data/bash/.bash_history:/home/.bash_history
        ports:
            - "${DEV_HTTP_HOST_PORT:-8180}:8080"

    rabbitmq:
        image: rabbitmq:3.13-management
        profiles: [ 'all' ]
        restart: 'no'
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        ports:
            - "${RABBITMQ_HOST_PORT:-5673}:5672"
            - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15673}:15672"

    redis:
        image: redis:7-alpine
        profiles: [ 'all' ]
        restart: 'no'
        ports:
            - "${REDIS_HOST_PORT:-6380}:6379"

    mysql:
        image: mysql:8.4
        profiles: [ 'all' ]
        restart: 'no'
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: melody_example
            MYSQL_USER: melody
            MYSQL_PASSWORD: melody
        ports:
            - "${MYSQL_HOST_PORT:-3307}:3306"

    minio:
        image: minio/minio:latest
        profiles: [ 'all' ]
        restart: 'no'
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        ports:
            - "${MINIO_HOST_PORT:-9000}:9000"
            - "${MINIO_CONSOLE_HOST_PORT:-9090}:9001"
