services:
    dev:
        build:
            context: ${RELATIVE_PATH_TO_ROOT}
            dockerfile: ${DOCKER_PATH}/Dockerfile
            args:
                DOCKER_PATH: ${DOCKER_PATH}
                WORKDIR: ${CONTAINER_ROOT_PATH}
                CONFIG_PATH: ${DOCKER_PATH}
                ROOT_PATH: ${CONTAINER_ROOT_PATH}
        restart: 'no'
        volumes:
            - ${RELATIVE_PATH_TO_ROOT}:${CONTAINER_ROOT_PATH}
            - ${RELATIVE_PATH_TO_ROOT}/.dev-data/go/pkg/mod:/go/pkg/mod
            - ${RELATIVE_PATH_TO_ROOT}/.dev-data/go/cache:/go/cache
            - ${RELATIVE_PATH_TO_ROOT}/.dev-data/bash/.bash_history:/home/.bash_history
        ports:
            - "8180:8080"

    rabbitmq:
        image: rabbitmq:3.13-management
        restart: 'no'
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        ports:
            - "5673:5672"
            - "15673:15672"

    redis:
        image: redis:7-alpine
        restart: 'no'
        ports:
            - "6380:6379"

    mysql:
        image: mysql:8.4
        restart: 'no'
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: melody_example
            MYSQL_USER: melody
            MYSQL_PASSWORD: melody
        ports:
            - "3307:3306"

    minio:
        image: minio/minio:latest
        restart: 'no'
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        ports:
            - "9000:9000"
            - "9090:9001"
